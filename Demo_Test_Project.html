<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website Hema Durga</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        header {
            background: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: #f4f4f4;
            padding: 50px;
            text-align: center;
        }

        .hero h1 {
            margin-bottom: 10px;
        }

        .content {
            padding: 20px;
        }

        .card {
            background: #eee;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
        <p>Welcome to my simple site</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h1>Hello 👋</h1>
        <p>This is a hema to durga project push</p>
    </section>

    <section class="content">
        <div class="card">
            <h2>About</h2>
            <p>This is a basic layout you can customize.</p>
        </div>

        <div class="card">
            <h2>Services</h2>
            <p>You can add your services here.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
